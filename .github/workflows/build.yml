name: Build Sentry APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip the project
        run: |
          ZIP=$(ls *.zip | head -n1)
          unzip -o "$ZIP" -d .
          ls SentryNVR

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: yes | sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" >/dev/null || true

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build APK
        working-directory: SentryNVR
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Name the APK
        working-directory: SentryNVR
        run: |
          VER=$(grep versionName app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk "out/Sentry-v${VER}.apk"
          ls -la out

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sentry-build
          path: SentryNVR/out/Sentry-v*.apk
          if-no-files-found: error
